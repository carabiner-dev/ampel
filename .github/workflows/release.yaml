name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write # To push artifacts to the relase
      id-token: write # To sign attestations 
      attestations: write
      packages: write # To push the image

    env:
      KO_DOCKER_REPO: ghcr.io/${{ github.repository }}

    steps:
      - name: Setup bnd
        uses: carabiner-dev/actions/install/bnd@94f29392187fe5082d1195a7d4cae3a7ddf09d9c # v1.2.1

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install tejolote
        uses: kubernetes-sigs/release-actions/setup-tejolote@8753ea6bdadb814d779c6ec34eaca689dbfb492b # v0.4.3

      - name: Install bom
        uses: kubernetes-sigs/release-actions/setup-bom@8753ea6bdadb814d779c6ec34eaca689dbfb492b # v0.4.3

      - name: Set tag output
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - name: Install ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        with:
          version: v0.18.1

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | ko login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        id: goreleaser
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: ko
        env:
          GIT_HASH: ${{ github.sha }}
          GIT_VERSION: ${{ steps.tag.outputs.tag_name }}
        run: |
          set -euo pipefail
          IMAGE_REF=$(ko build ./cmd/ampel \
            --bare \
            --platform=linux/amd64,linux/arm64 \
            --tags="${{ steps.tag.outputs.tag_name }},latest" \
            --image-refs=image.refs)
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${IMAGE_REF}"

      - name: Sign image with cosign (keyless, new bundle format)
        run: |
          cosign sign --yes --new-bundle-format "${{ steps.ko.outputs.image_ref }}"

      - name: Generate Provenance
        id: tejolote
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            tejolote attest --artifacts github://${{github.repository}}/${{ steps.tag.outputs.tag_name }} github://${{github.repository}}/"${GITHUB_RUN_ID}" --output provenance.json

      - name: Add image subjects to provenance
        run: |
          set -euo pipefail
          # ko wrote the published image digests (the multi-arch index plus each
          # per-platform manifest) to image.refs. Add them as subjects of the
          # provenance statement before it gets signed.
          subjects=$(while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            jq -n --arg name "${ref%@*}" --arg sha "${ref##*@sha256:}" \
              '{name: $name, digest: {sha256: $sha}}'
          done < image.refs | jq -s '.')
          jq --argjson subs "$subjects" '.subject = (.subject + $subs)' \
            provenance.json > provenance.subjects.json
          mv provenance.subjects.json provenance.json

      - name: Sign and upload Provenance
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            bnd statement provenance.json -o ampel-${{ steps.tag.outputs.tag_name }}.provenance.json
            gh release upload ${{ steps.tag.outputs.tag_name }} ampel-${{ steps.tag.outputs.tag_name }}.provenance.json

      - name: Generate SBOM
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bom generate --format=json -o /tmp/ampel-${{ steps.tag.outputs.tag_name }}.spdx.json .
          gh release upload ${{ steps.tag.outputs.tag_name }} /tmp/ampel-${{ steps.tag.outputs.tag_name }}.spdx.json
