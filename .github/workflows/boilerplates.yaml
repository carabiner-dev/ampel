name: Check Copyright Boilerplates

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  check:
    name: Boilerplate Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        extension:
        - go
        - sh
        - yaml
        - yml
        - html
        - css
        include:
        - extension: go
          language: Go
        - extension: sh
          language: Bash
        - extension: yaml
          language: YAML
        - extension: yml
          language: YAML
        - extension: proto
          language: protobuf

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - id: boilerplate-check-1
        continue-on-error: true
        uses: chainguard-dev/actions/boilerplate@fabe4ed3f66ceb5f8ec86ed7ae6d0c945ca362fb # v1.6.28
        with:
          boilerplate-directory: "./hack/boilerplates"
          extension: ${{ matrix.extension }}
          language: ${{ matrix.language }}

      - id: boilerplate-check-2
        if: steps.boilerplate-check-1.outcome == 'failure'
        uses: chainguard-dev/actions/boilerplate@fabe4ed3f66ceb5f8ec86ed7ae6d0c945ca362fb # v1.6.28
        with:
          boilerplate-directory: "./hack/boilerplates"
          extension: ${{ matrix.extension }}
          language: ${{ matrix.language }}
